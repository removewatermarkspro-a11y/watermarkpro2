name: Daily Blog Generation

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC = 12:00 noon Paris time
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install replicate

      - name: Generate daily blog article
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: node generate-daily-blog.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "📝 Auto-generate daily blog article [skip ci]"
          git pull --rebase origin main
          git push origin main
